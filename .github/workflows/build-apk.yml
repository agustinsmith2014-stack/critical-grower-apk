name: Build APK
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar dependencias
        run: npm install

      - name: Generar proyecto Android
        run: npx cap add android

      - name: Habilitar Firebase (google-services)
        run: |
          sed -i "/com.android.tools.build:gradle/a\\        classpath 'com.google.gms:google-services:4.4.2'" android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle

      - name: Inyectar google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Inyectar keystore de firma
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android/app/release.keystore

      - name: Compilar APK firmado
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASS }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASS }}"

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: critical-grower-apk
          path: android/app/build/outputs/apk/release/*.apk
